<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Yo"/>
  <meta name="theme-color" content="#0a0a0a"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png"/>
  <link rel="icon" href="/favicon.ico"/>
  <link rel="stylesheet" href="/style.css"/>
  <title>YO</title>
</head>
<body>
  <div class="container">
    <h1>YO</h1>
    <p class="subtitle">Hold to speak • I talk back</p>
    <div id="status" class="status">Tap &amp; hold the mic</div>
    <div class="mic-container">
      <button id="micBtn" class="mic-button">🎤</button>
    </div>
    <div id="transcript" class="transcript"></div>
    <div id="reply" class="reply"></div>
    <button id="clearBtn" class="clear-btn">Clear History</button>
  </div>
  <script src="/script.js"></script>
</body>
</html>
